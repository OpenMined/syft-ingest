name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit-tests:
    name: Unit tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install uv
        # Pinned to a full semver rather than a floating major tag: as of
        # setup-uv v8.0.0, only exact-version tags are published (the @v8
        # float was dropped for supply-chain safety). Bump the pin
        # intentionally when upgrading.
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install just
        uses: extractions/setup-just@v4

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        # --all-extras pulls in web/arxiv/podcast/rag/multimodal/qdrant/weaviate/
        # chroma/openai-embeddings/notebooklm so every import path under test is
        # resolvable. Integration-only deps (real BrightData creds, yt-dlp
        # cookies) aren't needed here — only unit tests run.
        run: uv sync --all-extras --dev

      - name: Run unit tests
        # Integration tests live in tests/integration and hit live BrightData /
        # YouTube. They cost money and need secrets, so they're intentionally
        # out of scope for PR CI.
        run: just test tests/unit
